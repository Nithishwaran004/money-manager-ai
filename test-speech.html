<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech Recognition Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #10b981;
      color: white;
    }
    button.listening {
      background: #ef4444;
    }
    #result {
      margin-top: 20px;
      padding: 20px;
      background: #1e293b;
      border-radius: 8px;
      min-height: 100px;
    }
    .platform {
      background: #6366f1;
      padding: 5px 10px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>🎤 Speech Recognition Test</h1>
  
  <div class="platform" id="platform">Platform: Detecting...</div>
  
  <div>
    <button id="startBtn">Start Listening</button>
    <button id="stopBtn" disabled>Stop Listening</button>
  </div>
  
  <div id="result">
    <strong>Transcript:</strong><br>
    <span id="transcript">Click "Start Listening" and speak...</span>
  </div>
  
  <div style="margin-top: 20px; font-size: 14px; opacity: 0.7;">
    <p><strong>Try saying:</strong></p>
    <ul>
      <li>"Spent 100 on food"</li>
      <li>"Received salary 45000"</li>
      <li>"Petrol 300 rupees"</li>
    </ul>
  </div>

  <script>
    const platformEl = document.getElementById('platform');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptEl = document.getElementById('transcript');
    
    // Detect platform
    const isNative = window.Capacitor && window.Capacitor.isNativePlatform();
    platformEl.textContent = `Platform: ${isNative ? 'Native Android (Capacitor)' : 'Web Browser'}`;
    
    let recognition = null;
    
    // Web Speech API setup
    if (!isNative) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
          console.log('🎤 Started');
          startBtn.classList.add('listening');
          startBtn.textContent = 'Listening...';
          startBtn.disabled = true;
          stopBtn.disabled = false;
        };
        
        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript + ' ';
          }
          transcriptEl.textContent = transcript;
        };
        
        recognition.onend = () => {
          console.log('🛑 Stopped');
          startBtn.classList.remove('listening');
          startBtn.textContent = 'Start Listening';
          startBtn.disabled = false;
          stopBtn.disabled = true;
        };
        
        recognition.onerror = (event) => {
          console.error('Error:', event.error);
          transcriptEl.textContent = `Error: ${event.error}`;
        };
      } else {
        transcriptEl.textContent = 'Speech recognition not supported in this browser';
        startBtn.disabled = true;
      }
    }
    
    startBtn.addEventListener('click', () => {
      if (isNative) {
        transcriptEl.textContent = 'Native Android: Use the app to test';
      } else if (recognition) {
        recognition.start();
      }
    });
    
    stopBtn.addEventListener('click', () => {
      if (!isNative && recognition) {
        recognition.stop();
      }
    });
  </script>
</body>
</html>
